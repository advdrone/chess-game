<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Chess Board</title>
  
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    :root {
      --square-size: 75px;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(8, var(--square-size));
    }

    .light-square {
      width: var(--square-size);
      height: var(--square-size);
      background-color: rgb(201, 242, 183);
    }

    .selected {
      background-color: rgb(148, 148, 91) !important;
    }

    .valid-move {
      display:flex;
      align-items: center;
      justify-content: center;
      position: relative
    }

    .valid-move::after {
      position: absolute;
      display:block;
      content: "";
      border-radius: 100%;
      width: 25px;
      height: 25px;
      background-color:rgb(181, 181, 181);
      opacity: 0.5;
      z-index: 20;
    }

    .dark-square {
      width: var(--square-size);
      height: var(--square-size);
      background-color: green;
    }

    .chess-piece {
      width: var(--square-size);
      height: var(--square-size);
    }
  </style>

</head>
  <body>
    <div class="grid-container">
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
